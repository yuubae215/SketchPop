<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SketchPop</title>
</head>
<body>
    <div id="container">

        <!-- Unified top bar -->
        <div id="top-bar">
            <!-- Left: app name + undo/redo + save/load -->
            <div class="top-bar__section top-bar__left">
                <span class="top-bar__logo">SketchPop</span>
                <div class="top-bar__sep"></div>
                <button id="top-undo" class="tb-btn" title="Undo (Ctrl+Z)" disabled>
                    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
                </button>
                <button id="top-redo" class="tb-btn" title="Redo (Ctrl+Y)" disabled>
                    <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="currentColor"/></svg>
                </button>
                <div class="top-bar__sep"></div>
                <!-- Save / Load project -->
                <button id="top-save" class="tb-btn" title="Save project (Ctrl+S)">
                    <svg viewBox="0 0 24 24"><path d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm-5 16a3 3 0 110-6 3 3 0 010 6zm3-10H5V5h10v4z" fill="currentColor"/></svg>
                </button>
                <button id="top-load" class="tb-btn" title="Load project">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z" fill="currentColor"/></svg>
                </button>
            </div>

            <!-- Center: mode buttons -->
            <div class="top-bar__section top-bar__center">
                <button id="sidebar-sketch" class="tb-mode-btn active" title="Sketch (S)">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
                    Sketch
                </button>
                <button id="sidebar-extrude" class="tb-mode-btn" title="Extrude (E)">
                    <svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z" fill="currentColor"/></svg>
                    Extrude
                </button>
                <button id="sidebar-select" class="tb-mode-btn" title="Select (V)">
                    <svg viewBox="0 0 24 24"><path d="M4 4l4 16 3-7 7-3L4 4z" fill="currentColor"/></svg>
                    Select
                </button>
            </div>

            <!-- Right: object actions + grid snap + export + view controls -->
            <div class="top-bar__section top-bar__right">
                <button id="top-duplicate" class="tb-btn" title="Duplicate (Ctrl+D)" disabled>
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/></svg>
                </button>
                <button id="sidebar-clear" class="tb-btn tb-btn--danger" title="Clear all">
                    <svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <div class="top-bar__sep"></div>
                <!-- Grid snap toggle -->
                <button id="top-snap" class="tb-btn" title="Grid snap (G)">
                    <svg viewBox="0 0 24 24"><path d="M3 3h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4zM3 10h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4zM3 17h4v4H3zm7 0h4v4h-4zm7 0h4v4h-4z" fill="currentColor"/></svg>
                </button>
                <!-- Export dropdown -->
                <div class="tb-dropdown">
                    <button id="top-export" class="tb-btn" title="Export">
                        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z" fill="currentColor"/></svg>
                    </button>
                    <div class="tb-dropdown__menu" id="export-menu">
                        <button class="tb-dropdown__item" data-export="stl">STL (3D Print)</button>
                        <button class="tb-dropdown__item" data-export="obj">OBJ</button>
                        <button class="tb-dropdown__item" data-export="gltf">GLTF</button>
                        <button class="tb-dropdown__item" data-export="glb">GLB</button>
                        <button class="tb-dropdown__item" data-export="png">PNG Screenshot</button>
                    </div>
                </div>
                <div class="top-bar__sep"></div>
                <!-- Display mode + History panel buttons injected by DisplayModeManager / palette -->
                <button id="top-history" class="tb-btn" title="History panel (H)">
                    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7a6.99 6.99 0 01-5.04-2.11L6.51 18.34A8.987 8.987 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" fill="currentColor"/></svg>
                </button>
                <button id="top-command-palette" class="tb-btn" title="Command palette (Ctrl+K)">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.5 6.5 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
                </button>
                <!-- Measure toggle -->
                <button id="top-measure" class="tb-btn" title="Measurement tools (M)">
                    <svg viewBox="0 0 24 24"><path d="M21 6.5l-4-4-14 14 4 4 14-14zm-14 11.5l-1.5-1.5 9-9 1.5 1.5-9 9zM5 20l-3-3 1.5-1.5L5 17l1.5-1.5L8 17l-3 3z" fill="currentColor"/></svg>
                </button>
                <!-- Edge select toggle -->
                <button id="top-edge-select" class="tb-btn" title="Edge select mode">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16v2H4zm0 14h16v2H4zm0-7h2v2H4zm14 0h2v2h-2zM8 11h8v2H8z" fill="currentColor"/></svg>
                </button>
                <!-- Construction plane toggle -->
                <button id="top-construction-plane" class="tb-btn" title="Construction plane — hover a face and press Space">
                    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15l4-4 3 3 3-3 4 4H5z" fill="currentColor"/></svg>
                </button>
                <!-- Boolean operations dropdown -->
                <div class="tb-dropdown">
                    <button id="top-boolean" class="tb-btn" title="Boolean operations">
                        <svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V5a2 2 0 00-2-2zm-5 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z" fill="currentColor"/></svg>
                    </button>
                    <div class="tb-dropdown__menu" id="boolean-menu">
                        <button class="tb-dropdown__item" data-bool="union">Union (A + B)</button>
                        <button class="tb-dropdown__item" data-bool="difference">Difference (A − B)</button>
                        <button class="tb-dropdown__item" data-bool="intersect">Intersect (A ∩ B)</button>
                        <div class="tb-dropdown__sep"></div>
                        <button class="tb-dropdown__item" data-bool="fillet">Fillet top edges</button>
                        <button class="tb-dropdown__item" data-bool="chamfer">Chamfer top edges</button>
                    </div>
                </div>
                <!-- Procedural script editor -->
                <button id="top-script-editor" class="tb-btn" title="Procedural Script Editor (Ctrl+Shift+P)">
                    <svg viewBox="0 0 24 24"><path d="M8 3a2 2 0 00-2 2v4a2 2 0 01-2 2H3v2h1a2 2 0 012 2v4a2 2 0 002 2h2v-2H8v-5a2 2 0 00-2-2 2 2 0 002-2V5h2V3H8zm8 0a2 2 0 012 2v4a2 2 0 002 2h1v2h-1a2 2 0 00-2 2v4a2 2 0 01-2 2h-2v-2h2v-5a2 2 0 012-2 2 2 0 01-2-2V5h-2V3h2z" fill="currentColor"/></svg>
                </button>
                <div class="top-bar__sep"></div>
                <button id="perspective-btn" class="tb-btn active" title="Perspective (P)">P</button>
                <button id="orthographic-btn" class="tb-btn" title="Orthographic (O)">O</button>
                <button id="home-btn" class="tb-btn" title="Fit all (F)">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
                </button>
                <div class="top-bar__sep"></div>
                <!-- Orbit mode toggle (useful on mobile where touch is shared) -->
                <button id="top-orbit-mode" class="tb-btn" title="Orbit mode — finger rotates camera (touch)">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/></svg>
                </button>
            </div>
        </div>

        <div id="canvas-container">
            <!-- Property Panel (right slide-in, shown when object selected) -->
            <div id="property-panel">
                <div class="prop-header">
                    <span id="prop-obj-name" class="prop-title">Properties</span>
                    <button id="prop-panel-close" class="prop-close" title="Close">×</button>
                </div>
                <div class="prop-body">
                    <!-- Position -->
                    <div class="prop-section">
                        <div class="prop-section-label">Position</div>
                        <div class="prop-row">
                            <span class="prop-label prop-label--x">X</span>
                            <input class="prop-input" type="number" id="prop-pos-x" step="0.1">
                        </div>
                        <div class="prop-row">
                            <span class="prop-label prop-label--y">Y</span>
                            <input class="prop-input" type="number" id="prop-pos-y" step="0.1">
                        </div>
                        <div class="prop-row">
                            <span class="prop-label prop-label--z">Z</span>
                            <input class="prop-input" type="number" id="prop-pos-z" step="0.1">
                        </div>
                    </div>
                    <!-- Dimensions -->
                    <div class="prop-section">
                        <div class="prop-section-label">Dimensions</div>
                        <div class="prop-row">
                            <span class="prop-label">W</span>
                            <input class="prop-input readonly" type="number" id="prop-dim-w" step="0.1" readonly>
                        </div>
                        <div class="prop-row">
                            <span class="prop-label">D</span>
                            <input class="prop-input readonly" type="number" id="prop-dim-d" step="0.1" readonly>
                        </div>
                        <div class="prop-row">
                            <span class="prop-label">H</span>
                            <input class="prop-input" type="number" id="prop-dim-h" step="0.1" min="0.1">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Procedural Script Editor (left slide-in) -->
            <div id="script-editor-panel">
                <div class="spe-header">
                    <span class="spe-title">
                        <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:-2px;margin-right:4px"><path d="M8 3a2 2 0 00-2 2v4a2 2 0 01-2 2H3v2h1a2 2 0 012 2v4a2 2 0 002 2h2v-2H8v-5a2 2 0 00-2-2 2 2 0 002-2V5h2V3H8zm8 0a2 2 0 012 2v4a2 2 0 002 2h1v2h-1a2 2 0 00-2 2v4a2 2 0 01-2 2h-2v-2h2v-5a2 2 0 012-2 2 2 0 01-2-2V5h-2V3h2z" fill="currentColor"/></svg>
                        Procedural Script
                    </span>
                    <button id="script-editor-close" class="prop-close" title="Close">×</button>
                </div>
                <div class="spe-body">
                    <textarea id="script-editor-textarea" class="spe-textarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
                    <div id="script-editor-error" class="spe-error" style="display:none"></div>
                    <div class="spe-actions">
                        <button id="script-editor-run" class="spe-btn spe-btn--run" title="Run script (Ctrl+Enter)">▶ Run</button>
                        <button id="script-editor-clear" class="spe-btn spe-btn--clear" title="Clear scene objects">Clear</button>
                    </div>
                    <div class="spe-params-section">
                        <div class="spe-params-label">Parameters</div>
                        <div id="script-editor-params" class="spe-params-list"></div>
                    </div>
                    <div class="spe-hint">
                        <code>sketch(x1,z1, x2,z2).extrude(h)</code><br>
                        <code>.move(dx,dy,dz) .subtract(b)</code><br>
                        <code>.union(b) .intersect(b)</code>
                    </div>
                </div>
            </div>

            <!-- Confirm / Cancel (shown while drawing or extruding) -->
            <div id="confirmationControls" style="display: none;">
                <button id="confirmShape" class="confirm-btn confirm-btn--ok">✓ Confirm</button>
                <button id="cancelShape" class="confirm-btn confirm-btn--cancel">✗ Cancel</button>
            </div>

            <!-- Minimal status bar -->
            <div id="status-bar">
                <span id="current-mode">Sketch</span>
                <span id="snap-indicator" class="snap-indicator" style="display:none">Snap 1.0</span>
                <span id="operation-hint"></span>
            </div>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SketchPop</title>
</head>
<body>
    <div id="container">
        <div id="canvas-container">
            <!-- Top-right: projection toggle + home -->
            <div id="top-controls">
                <button id="perspective-btn" class="ctrl-btn active" title="透視投影 (P)">P</button>
                <button id="orthographic-btn" class="ctrl-btn" title="平行投影 (O)">O</button>
                <button id="home-btn" class="ctrl-btn" title="全体表示 (F)">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="currentColor"/></svg>
                </button>
            </div>

            <!-- Mode toolbar (bottom on mobile, right on desktop) -->
            <div id="mode-toolbar">
                <button id="sidebar-sketch" class="mode-btn active" title="スケッチ (S)">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    <span class="mode-label">スケッチ</span>
                </button>
                <button id="sidebar-extrude" class="mode-btn" title="押し出し (E)">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/><path d="M12 8v8m-4-4h8" stroke="currentColor" stroke-width="1" fill="none"/></svg>
                    <span class="mode-label">押し出し</span>
                </button>
                <button id="sidebar-select" class="mode-btn" title="選択 (V)">
                    <svg viewBox="0 0 24 24"><path d="M4 4l4 16 3-7 7-3L4 4z" fill="currentColor"/></svg>
                    <span class="mode-label">選択</span>
                </button>
                <button id="sidebar-clear" class="mode-btn mode-btn--danger" title="全消去">
                    <svg viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <span class="mode-label">消去</span>
                </button>
            </div>

            <!-- Confirm / Cancel (shown while drawing or extruding) -->
            <div id="confirmationControls" style="display: none;">
                <button id="confirmShape" class="confirm-btn confirm-btn--ok">✓ 確定</button>
                <button id="cancelShape" class="confirm-btn confirm-btn--cancel">✗ キャンセル</button>
            </div>

            <!-- Minimal status bar -->
            <div id="status-bar">
                <span id="current-mode">スケッチ</span>
                <span id="operation-hint"></span>
            </div>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>
</html>
